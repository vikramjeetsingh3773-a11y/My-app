name: battlemint
description: "BattleMint - Esports Tournament Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0
  http: ^1.1.0
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0
  
  # Image & Media
  cached_network_image: ^3.3.0
  image_picker: ^1.0.0
  photo_view: ^0.14.0
  
  # UI Components
  cupertino_icons: ^1.0.0
  flutter_svg: ^2.0.0
  lottie: ^2.6.0
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0
  
  # Navigation
  go_router: ^12.0.0
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  firebase_analytics: ^10.7.0
  
  # Authentication
  jwt_decoder: ^2.0.1
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0
  timeago: ^3.6.0
  connectivity_plus: ^5.0.0
  permission_handler: ^11.4.0
  
  # Payments
  upi_india: ^2.0.2
  razorpay_flutter: ^1.3.7
  
  # Analytics & Logging
  sentry_flutter: ^7.17.0
  logger: ^2.1.0
  
  # Testing
  mockito: ^5.4.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  
  fonts:
    - family: SFProDisplay
      fonts:
        - asset: assets/fonts/SFProDisplay-Regular.ttf
        - asset: assets/fonts/SFProDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/SFProDisplay-SemiBold.ttf
          weight: 600
    
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
